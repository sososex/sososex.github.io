<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularz Kontaktowy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #dcd8f5 0%, #b8b3e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(4, 5, 14, 0.15);
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #2a2a40;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #7b77a8;
            text-align: center;
            margin-bottom: 35px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #2a2a40;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #dcd8f5;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            color: #2a2a40;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #7b77a8;
            box-shadow: 0 0 0 4px rgba(123, 119, 168, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #7b77a8 0%, #4e4e8c 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(123, 119, 168, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123, 119, 168, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
            display: block;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
            display: block;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        .submit-btn.loading .loader {
            display: block;
        }

        @media (max-width: 600px) {
            .form-container {
                padding: 35px 25px;
            }

            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Skontaktuj się</h1>
        <p class="subtitle">Odpowiem w ciągu 24 godzin</p>

        <div id="messageBox" class="message"></div>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">Imię i nazwisko *</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    required 
                    placeholder="Jan Kowalski"
                >
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="jan@example.com"
                >
            </div>

            <div class="form-group">
                <label for="message">Wiadomość *</label>
                <textarea 
                    id="message" 
                    name="message" 
                    required 
                    placeholder="Opisz czym mogę Ci pomóc..."
                ></textarea>
            </div>

            <button type="submit" class="submit-btn">
                <span class="btn-text">Wyślij wiadomość</span>
                <div class="loader"></div>
            </button>
        </form>
    </div>

    <script>
        // ⚙️ CONFIGURATION - CHANGE THIS URL TO YOUR CLOUDFLARE TUNNEL URL
        const WEBHOOK_URL = 'https://pub-immediately-inline-people.trycloudflare.com/webhook-test/contact-form';

        const form = document.getElementById('contactForm');
        const submitBtn = form.querySelector('.submit-btn');
        const messageBox = document.getElementById('messageBox');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get form data
            const formData = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                message: document.getElementById('message').value.trim()
            };

            // Validation
            if (!formData.name || !formData.email || !formData.message) {
                showMessage('Proszę wypełnić wszystkie pola', 'error');
                return;
            }

            // Show loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            messageBox.style.display = 'none';

            try {
                // Send to n8n webhook
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    // Success
                    showMessage('✅ Dziękuję! Twoja wiadomość została wysłana. Odpowiem wkrótce!', 'success');
                    form.reset();
                } else {
                    // Server error
                    throw new Error('Server error');
                }

            } catch (error) {
                // Error handling
                console.error('Error:', error);
                showMessage('❌ Wystąpił błąd. Spróbuj ponownie lub napisz bezpośrednio na: kontakt@twojadomena.pl', 'error');
            } finally {
                // Reset button state
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = `message ${type}`;
            messageBox.style.display = 'block';

            // Auto-hide success message after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
